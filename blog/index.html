---
layout: default
title: Blog
---

<h1>Blog</h1>

{% for post in site.posts %}
  <article class="post-summary">
    <h2>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </h2>

    <time datetime="{{ post.date | date_to_xmlschema }}">
      {{ post.date | date: "%B %-d, %Y" }}
    </time>

    {{ post.excerpt }}
  </article>
{% endfor %}
